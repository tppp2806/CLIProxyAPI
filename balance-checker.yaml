providers:
    - name: MINIMAX官方
      enabled: true
      method: GET
      url: https://www.minimaxi.com/v1/api/openplatform/coding_plan/remains
      headers: |-
        {
          "Authorization": "Bearer {api_key}",
          "Content-Type": "application/json"
        }
      body: ""
      balance_path: $.model_remains[0].current_interval_usage_count
      balance_type: float
      balance_multiplier: 0.05
      used_balance_path: $.model_remains[0].current_interval_total_count-$.model_remains[0].current_interval_usage_count
      reset_cycle_path: $.model_remains[0].end_time
      enable_proxy: false
    - name: 智谱官方
      enabled: true
      method: GET
      url: https://open.bigmodel.cn/api/biz/tokenAccounts/list/my?pageNum=1&pageSize=10&filterEnabled=false
      headers: |-
        {
          "Authorization": "Bearer {api_key}",
          "Content-Type": "application/json"
        }
      body: ""
      balance_path: rows.#(tokenNo%\"bundle_848\").tokenBalance
      balance_type: float
      balance_multiplier: 1e-06
      used_balance_path: rows.#(tokenNo%\"bundle_848\").tokensMagnitude-rows.#(tokenNo%\"bundle_848\").tokenBalance
      reset_cycle_path: rows.#(tokenNo%\"bundle_848\").expirationTime
      enable_proxy: false
    - name: DMXAPI
      enabled: true
      method: GET
      url: "22"
      headers: '{"Authorization": "Bearer {api_key}"}'
      body: ""
      balance_path: ""
      balance_type: float
      balance_multiplier: 1
      used_balance_path: ""
      reset_cycle_path: "-1"
      enable_proxy: false
    - name: lucen.cc
      enabled: true
      method: GET
      url: https://lucen.cc/api/v1/auth/me?timezone=Asia%2FShanghai
      headers: '{"authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjo4MTkyLCJlbWFpbCI6IjI4MDYyODQ4MjlAcXEuY29tIiwicm9sZSI6InVzZXIiLCJ0b2tlbl92ZXJzaW9uIjowLCJleHAiOjE3NzcwNDIyODksIm5iZiI6MTc3Njk1NTg4OSwiaWF0IjoxNzc2OTU1ODg5fQ.UrqyXvxLatTXUm1EADnyGY3QNoNK5RbF4z_Cv1FW1WU"}'
      body: '{}'
